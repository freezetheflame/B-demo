version: "3.8"

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: biz-postgres
    environment:
      POSTGRES_DB: biz_forms
      POSTGRES_USER: bizadmin
      POSTGRES_PASSWORD: bizpass123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bizadmin -d biz_forms"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: biz-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
