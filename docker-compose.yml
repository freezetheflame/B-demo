version: "3.8"

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: biz-postgres
    environment:
      POSTGRES_DB: biz_forms
      POSTGRES_USER: bizadmin
      POSTGRES_PASSWORD: bizpass123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bizadmin -d biz_forms"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: biz-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    container_name: biz-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://bizadmin:bizpass123@biz-postgres:5432/biz_forms"
      DATABASE_URL_SYNC: "postgresql+psycopg2://bizadmin:bizpass123@biz-postgres:5432/biz_forms"
      REDIS_URL: "redis://biz-redis:6379/0"
      CELERY_BROKER_URL: "redis://biz-redis:6379/1"
      CELERY_RESULT_BACKEND: "redis://biz-redis:6379/2"
      DEBUG: "true"
      CORS_ORIGINS: '["http://localhost:3000"]'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
